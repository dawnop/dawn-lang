name: release

# Why this exists: dawnop-site runs its production backend on code this compiler
# builds, and a tag is only pinnable if it ships an artifact — pushing `v*`
# publishes dawn-selfhost.jar, which is also the next bootstrap seed
# (docs/bootstrap.md, 种子推进协议). The Kotlin implementation is archived at
# the kotlin-final tag; releases before v0.8.0 shipped its dawn.jar too.
#
# Releasing is: bump VERSION in selfhost/src/version.dawn, commit, then
#   git tag v0.9.0 && git push --tags
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the release and upload the jar

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Seed consecration: every release jar is the next bootstrap seed, so
      # the tag itself must pass the self-hosting gates — ci.yml runs them on
      # main, but a tag can point anywhere. The chain is seed → A → B → C:
      # the published jar is B (HEAD compiled by HEAD), proven by cmp B C.
      - name: build the toolchain chain from the seed
        run: |
          . scripts/seedjar.sh
          ROOT=$(pwd)
          SEED="$(seed_jar)"
          V="--std std --embed-std std --vendor dawn/tool --vendor org/objectweb/asm --vendor coursierapi"
          java -Xss512m -jar "$SEED" build selfhost -o a.jar $V
          java -Xss512m -jar a.jar build selfhost -o dawn-selfhost.jar $V
          java -Xss512m -jar dawn-selfhost.jar build selfhost -o c.jar $V
          cmp dawn-selfhost.jar c.jar
          echo "closure OK (B == C)"

      # ci.yml runs on push to main, but a tag can point anywhere. Re-run the
      # suite here rather than trust that some earlier run covered this commit.
      - name: tests
        run: |
          java -Xss512m -jar dawn-selfhost.jar test selfhost
          java -Xss512m -jar dawn-selfhost.jar test site

      # The tag is what consumers pin, so it must name what is in the jar
      # (VERSION in selfhost/src/version.dawn).
      - name: the jar reports the version we think it does
        run: |
          OUT=$(java -Xss512m -jar dawn-selfhost.jar --version)
          echo "$OUT"
          case "$OUT" in
            "dawn ${GITHUB_REF_NAME#v} ("*) ;;
            *) echo "::error::--version said '$OUT' (bump selfhost/src/version.dawn)"; exit 1 ;;
          esac

      # gh is preinstalled on runners — no third-party action in the release path.
      - name: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dawn-selfhost.jar \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
