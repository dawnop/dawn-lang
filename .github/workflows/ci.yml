name: ci

# Why this exists: the site generator was broken for a whole milestone without
# anyone noticing — docs drifted past a hardcoded lint and nothing ever built the
# site on push. The compiler suite runs in seconds, so there is no reason not to.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The ssh login name and the site's real IP must not enter this public repo:
  # the redeploy scripts once hardcoded user@dawnop.com and it sat in history (and
  # the v0.1.0 tag) until a 2026-07-18 cleanup. A convention nothing checks decays,
  # so it is a check now. Same script the local pre-push hook runs.
  secrets:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 so the trailer check can see the pushed commit range's
      # history; the identity guard only looks at the tree and does not need it.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: no server identity in the repo
        run: python3 scripts/check-no-server-identity.py

      # No Claude attribution in new commits. Suppressed at the Claude Code
      # settings source, but that is per-machine/per-session — a different machine
      # or an insistent system prompt slips it back in. commit-msg catches it
      # locally (opt-in hook), this catches it authoritatively. Such trailers once
      # had to be force-pushed out of history; this exists so that cannot recur.
      - name: no Claude attribution in commit messages
        run: |
          if [ "${{ github.event_name }}" = pull_request ]; then
            range="origin/${{ github.base_ref }}...HEAD"
          elif [ "${{ github.event.before }}" = 0000000000000000000000000000000000000000 ]; then
            range="HEAD~1..HEAD"
          else
            range="${{ github.event.before }}..HEAD"
          fi
          python3 scripts/check-no-claude-trailer.py --range "$range"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # site/build.sh builds the Playground editor bundle, so CI needs npm.
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: site/play-ui/package-lock.json

      # keep the seed jar across runs — it only changes when
      # scripts/seed-release.txt bumps
      - name: cache the bootstrap seed
        uses: actions/cache@v4
        with:
          path: .dawn/seeds
          key: dawn-seed-${{ hashFiles('scripts/seed-release.txt') }}

      # bin/dawn fetches the previous release's dawn-selfhost.jar (the
      # bootstrap seed, scripts/seed-release.txt) and rebuilds the toolchain
      # from HEAD sources. Every `./bin/dawn` step below exercises selfhost.
      - name: build the selfhost toolchain
        run: ./bin/dawn --version

      - name: site tests
        run: ./bin/dawn test site

      # source packages (packages/, docs/package-design.md 项目 B): the web
      # framework's own suite, plus playground/site consuming them via [deps]
      - name: package tests
        run: ./bin/dawn test packages/web && ./bin/dawn test playground

      - name: selfhost tests
        run: ./bin/dawn test selfhost

      # The self-hosting proof: seed → A → B → C, cmp B C — the compiler
      # reproduces itself byte-identically from its own output.
      - name: selfhost fixed point (B == C)
        run: ./scripts/selfhost-fixpoint.sh

      # The playground runs a public endpoint that compiles and executes code
      # strangers send it, and nothing here ever ran its contract test: the
      # sandbox timeout, the 413 on oversized bodies, and the check that compile
      # errors do not leak host paths were all trusted rather than exercised.
      - name: playground contract
        run: ./playground/test/contract.sh

      - name: site builds end-to-end (incl. the Playground editor bundle)
        run: ./site/build.sh

      - name: formatting
        run: ./bin/dawn fmt site selfhost packages --check

  # N vs N-1 (scripts/selfhost-prev-diff.sh): the previous release and HEAD
  # compile the same corpus and any byte difference must be declared in a
  # commit message. This is the oracle now that the Kotlin reference is
  # archived (kotlin-final), and doubles as the machine enforcement of the
  # seed feature discipline — the N-1 jar must still compile HEAD
  # selfhost/src. The same job replays the run/fmt/lsp transcripts against
  # the N-1 toolchain, the successors of the old Kotlin golden diffs.
  prev-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # the declared-change scan walks commits since the N-1 tag
          fetch-depth: 0

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: cache the bootstrap seed
        uses: actions/cache@v4
        with:
          path: .dawn/seeds
          key: dawn-seed-${{ hashFiles('scripts/seed-release.txt') }}

      - name: N vs N-1 differential
        run: ./scripts/selfhost-prev-diff.sh

      - name: run/test transcript vs N-1
        run: ./scripts/selfhost-run-diff.sh

      - name: formatter vs N-1
        run: ./scripts/selfhost-fmt-diff.sh

      - name: lsp transcript vs N-1
        run: ./scripts/selfhost-lsp-diff.sh
