# nginx snippet for the Playground API. Fold into the existing
# `server { server_name dawn-lang.dawnop.com; ... }` block (the static site is
# already served there; this adds the one dynamic endpoint).
#
# Everything hard — TLS, HTTP/2, gzip — stays in nginx; the Dawn runner only
# speaks plain HTTP/1.1 on 127.0.0.1:8087.

# Rate-limit zones (declare once, in the http{} block, not here):
#   limit_req_zone $binary_remote_addr zone=playrun:10m rate=12r/m;
#   limit_req_zone $binary_remote_addr zone=playcheck:10m rate=60r/m;

location = /api/run {
    limit_req zone=playrun burst=4 nodelay;
    limit_req_status 429;

    proxy_pass http://127.0.0.1:8087/run;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    # a compile+run can take a few seconds; allow for it but not forever
    proxy_read_timeout 30s;
    client_max_body_size 128k;   # the runner also caps at 64k; reject earlier
}

# Editor diagnostics: compile-only, fired on typing pauses, so the budget is
# looser than /run (~1/s sustained) but the timeout tighter (no program runs).
location = /api/check {
    limit_req zone=playcheck burst=10 nodelay;
    limit_req_status 429;

    proxy_pass http://127.0.0.1:8087/check;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_read_timeout 15s;
    client_max_body_size 128k;
}

location = /api/health {
    proxy_pass http://127.0.0.1:8087/health;
    access_log off;
}
