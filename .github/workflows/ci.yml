name: ci

# Why this exists: the site generator was broken for a whole milestone without
# anyone noticing — docs drifted past a hardcoded lint and nothing ever built the
# site on push. The compiler suite runs in ~2s, so there is no reason not to.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: gradle/actions/setup-gradle@v4

      # site/build.sh builds the Playground editor bundle when npm is present.
      # No `cache:` — it keys off a lockfile, and package-lock.json is gitignored
      # (.gitignore:9), so there is nothing in the checkout to key on.
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: compiler tests
        run: gradle :compiler:test

      # The site is Dawn code with its own tests, and building it end-to-end is
      # what would have caught the rot: docs/*.md are inputs to a lint that
      # panics on drift. Needs the fat jar that bin/dawn runs.
      - name: build the dawn CLI
        run: gradle :compiler:fatJar

      - name: site tests
        run: ./bin/dawn test site

      - name: site builds end-to-end (incl. the Playground editor bundle)
        run: ./site/build.sh

      - name: formatting
        run: ./bin/dawn fmt site --check
