# Pins the Gradle version so a fresh checkout and CI build with the same thing.
#
# distributionSha256Sum is set deliberately: without it the wrapper executes
# whatever the URL hands back. Verified against services.gradle.org's published
# .sha256 for 9.6.1.
#
# Note for mainland-China checkouts: the canonical URL 302s to github.com, which
# may be unreachable here. Seed the cache once instead of changing this URL (CI
# runners reach the canonical host fine):
#   D=~/.gradle/wrapper/dists/gradle-9.6.1-bin/4ticwg1pgcbps2hj28r8so764
#   curl -L -o $D/gradle-9.6.1-bin.zip https://mirrors.cloud.tencent.com/gradle/gradle-9.6.1-bin.zip
# The directory name is a hash of distributionUrl below, so it changes if the URL does.
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-9.6.1-bin.zip
distributionSha256Sum=9c0f7faeeb306cb14e4279a3e084ca6b596894089a0638e68a07c945a32c9e14
networkTimeout=60000
retries=3
retryBackOffMs=500
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
